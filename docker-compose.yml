version: '3.8'

services:
  # ===== PostgreSQL Database =====
  postgres:
    image: postgres:15-alpine
    container_name: family-tree-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-my_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Không expose port ra ngoài - chỉ internal network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis Cache =====
  redis:
    image: redis:7-alpine
    container_name: family-tree-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    # Không expose port ra ngoài - chỉ internal network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Backend API =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-tree-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123456}@postgres:5432/${POSTGRES_DB:-my_app}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ACCESS_SECRET: ${ACCESS_SECRET:-your_access_secret_here}
      REFRESH_SECRET: ${REFRESH_SECRET:-your_refresh_secret_here}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== Frontend =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family-tree-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: